<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Time Update</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
        }

        .container {
            max-width: 600px;
            margin: 20px auto;
            padding: 30px;
            color: #000;
            background-color: #deffda;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .header {
            font-size: 18px;
            font-weight: bold;
        }

        .content {
            margin-top: 20px;
        }

        .footer {
            margin-top: 40px;
            font-size: 14px;
            color: #555;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            {{header}}
        </div>
        <div class="content">
            <p>Dear {{employee_name}},</p>
            <p>As per your request, <span style="font-weight: bold;">{{update_user_name}}</span> have updated your
                attendance mistake, please do check once and
                confirm from your
                end.</p>
        </div>
        <div class="footer">
            Best regards,<br>
            PAS Digital Technologies<br>
        </div>
    </div>
</body>

</html>
